<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Deskivo - Pagina Inicial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/icofont/1.0.1/css/icofont.min.css">
</head>

<body>
    <h1>Pagina inicial</h1>
    <i class="icofont-user" data-bs-toggle="modal" data-bs-target="#staticBackdrop"
        style="font-size:30px; cursor:pointer;">
    </i>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
        Cadastrar Cliente
    </button>

    <!-- Modal -->
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="staticBackdropLabel">Cadastrar Cliente</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label for="inputPassword5" class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-control" aria-describedby="passwordHelpBlock">
                    <label for="inputPassword5" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" aria-describedby="passwordHelpBlock">
                    <label for="inputPassword5" class="form-label">CPF</label>
                    <input type="number" id="cpf" class="form-control" aria-describedby="passwordHelpBlock">
                    <label for="inputPassword5" class="form-label">RG</label>
                    <input type="number" id="rg" class="form-control" aria-describedby="passwordHelpBlock">
                    <label for="inputPassword5" class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" aria-describedby="passwordHelpBlock">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Salvar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
