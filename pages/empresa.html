<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <label class="form-label">Nome</label>
                <input type="text" id="nome" class="form-control">

                <label class="form-label mt-2">Email</label>
                <input type="email" id="email" class="form-control">

                <label class="form-label mt-2">CPF / CNPJ</label>
                <input type="number" id="cpf" class="form-control">

                <label class="form-label mt-2">RG / IE</label>
                <input type="number" id="rg" class="form-control">

                <label class="form-label mt-2">Senha</label>
                <input type="password" id="senha" class="form-control">

                <br>
                <button class="btn btn-primary">Cadastrar</button>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
