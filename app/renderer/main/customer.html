<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

    <button class="btn btn-primary" onclick="window.electronAPI.openPage('listacustomer.html')">Lista de clientes</button>
    <br><br>
    <input type="text" class="form-control" placeholder="Nome do cliente" id="name">

    <input type="text" class="form-control" placeholder="CPF do cliente" id="cpf">
    <br><br>
    <input type="text" class="form-control" placeholder="Telefone" id="telefone">
    <br><br>
    <button class="btn btn-success" id="save-button">Salvar Cliente</button>

    <script src="../js/customer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
