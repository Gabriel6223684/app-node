<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-content-header py-4">
        <div class="container-fluid">
            <div class="row align-items-center mb-4">
                <div class="col-sm-6">
                    <h3 class="fw-bold text-white mb-0">
                        <i class="bi bi-box-seam me-2" style="color: rgb(68, 4, 252);"></i>Gestão de Produtos
                    </h3>
                </div>
                <div class="col-sm-6">
                    <nav aria-label="breadcrumb">
                        <ol
                            class="breadcrumb float-sm-end bg-dark border border-secondary p-2 px-3 rounded-pill shadow-sm small">
<li class="breadcrumb-item"><a href="#"
                                    class="text-decoration-none text-white-50" onclick="irParaInicio(); return false;">Início</a></li>
                            <li class="breadcrumb-item active text-white" aria-current="page">Produtos</li>
                        </ol>
                    </nav>
                </div>
            </div>

            <div class="row">
                <div class="col-12 col-xl-11 mx-auto">

                    <form id="form">
                        <input type="hidden" id="id" name="id">
                        <input type="hidden" id="acao" name="acao">

                        <div class="card bg-dark border-secondary shadow-lg">
                            <div class="card-header bg-dark py-3 border-bottom border-secondary">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h6 class="m-0 fw-bold text-white-50 text-uppercase small"
                                        style="letter-spacing: 1px;">Relação de Produtos</h6>

                                    <div class="d-flex gap-2">
                                        <a href="/produto/print" target="_blank"
                                            class="btn btn-outline-light btn-sm rounded-pill px-3 shadow-sm fw-bold d-flex align-items-center gap-2 border-secondary">
                                            <i class="bi bi-printer" style="color: rgb(68, 4, 252);"></i> Imprimir
                                        </a>

                                        <a href="./produto.html"
                                            class="btn btn-sm rounded-pill px-3 shadow-sm fw-bold d-flex align-items-center gap-2 text-white"
                                            style="background-color: rgb(68, 4, 252); border: none;">
                                            <i class="bi bi-plus-circle-fill"></i> Cadastrar Novo
                                        </a>
                                    </div>
                                </div>
                            </div>

                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-dark table-hover align-middle mb-0" id="tabela">
                                        <thead class="bg-black text-white-50 small">
                                            <tr class="border-secondary">
                                                <th class="ps-4 py-3" style="width: 80px;">CÓDIGO</th>
                                                <th>NOME DO PRODUTO</th>
                                                <th>DESCRIÇÃO CURTA</th>
                                                <th>CÓD. BARRAS</th>
                                                <th class="text-center" style="width: 100px;">ESTOQUE</th>
                                                <th class="text-end" style="width: 120px;">VALOR</th>
                                                <th class="text-center" style="width: 200px;">AÇÕES</th>
                                            </tr>
                                        </thead>
                                        <tbody class="small text-white-50 border-top-0">
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="card-footer bg-dark border-top border-secondary py-3">
                                <span class="text-white-50 small">Mostrando produtos cadastrados no sistema.</span>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Ajuste de Estoque -->
    <div class="modal fade" id="modalAdjustStock" tabindex="-1" aria-labelledby="modalAdjustStockLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalAdjustStockLabel">
                        <i class="bi bi-box-seam me-2"></i>Ajuste de Estoque
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="id" name="id">
                    <input type="hidden" id="estoqueAtual" name="estoqueAtual">

                    <div class="mb-3">
                        <label class="form-label text-white-50">Estoque Atual</label>
                        <div id="estoqueAtualLabel" class="fw-bold text-white fs-5">-</div>
                    </div>

                    <div class="mb-3">
                        <label for="novaQuantidade" class="form-label text-white-50">Nova Quantidade</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary"
                            id="novaQuantidade" placeholder="Digite a nova quantidade" min="0" required>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="SaveStockAdjust()">
                        <i class="bi bi-check-circle me-1"></i>Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="listaproduto.js"></script>
</body>

</html>
